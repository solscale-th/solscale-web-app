# This workflow builds a Docker image, publishes it to Google Artifact
# Registry, and deploys it to the sol-scale-dev GKE namespace when there is a
# push to the "develop" branch.
#
# Trust setup (provisioned in project-fc5426d4-53ee-47af-8fb):
#
# - Workload Identity Pool "github-pool" (shared with sol-scale-api) + OIDC
#   provider "web-app-provider", scoped to solscale-th/solscale-web-app on
#   refs/heads/develop only.
# - Service account "web-app-deployer" with roles/artifactregistry.writer and
#   roles/container.developer, plus roles/iam.workloadIdentityUser bound to
#   the WIF principal above.
# - Namespace-scoped Kubernetes RBAC for that service account in
#   sol-scale-dev: the built-in "edit" ClusterRole (Deployments/Services) —
#   this app has no Ingress/ManagedCertificate manifests of its own (routing
#   for dev.solscale.co is defined in sol-scale-api's kube/ingress.yaml), so
#   no extra CRD permissions are needed. See kube/rbac-github-deployer.yaml.

name: 'Build and Deploy to GKE (development)'

on:
  push:
    branches:
      - develop

env:
  PROJECT_ID: 'project-fc5426d4-53ee-47af-8fb'
  GAR_LOCATION: 'asia-southeast2'
  GKE_CLUSTER: 'sol-scale-cluster'
  GKE_ZONE: 'asia-southeast2-a'
  NAMESPACE: 'sol-scale-dev'
  DEPLOYMENT_NAME: 'solscale-web-app'
  REPOSITORY: 'development'
  IMAGE: 'solscale-web-app'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/670549849584/locations/global/workloadIdentityPools/github-pool/providers/web-app-provider'
  SERVICE_ACCOUNT: 'web-app-deployer@project-fc5426d4-53ee-47af-8fb.iam.gserviceaccount.com'
  NEXT_PUBLIC_MARKETPLACE_API_URL: 'https://api-dev.solscale.co/graphql'
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: '670549849584-po46qh9j1b6khdlpccr83djp8a35s07g.apps.googleusercontent.com'
  NEXT_PUBLIC_LINE_CHANNEL_ID: '2010730980'

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: 'ubuntu-latest'
    environment: 'development'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567' # v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@6051de21ad50fbb1767bc93c11357a49082ad116' # v2
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Build and push Docker container'
        run: |-
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

          docker build \
            --tag "${DOCKER_TAG}" \
            --build-arg "NEXT_PUBLIC_MARKETPLACE_API_URL=${NEXT_PUBLIC_MARKETPLACE_API_URL}" \
            --build-arg "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}" \
            --build-arg "NEXT_PUBLIC_LINE_CHANNEL_ID=${NEXT_PUBLIC_LINE_CHANNEL_ID}" \
            .

          docker push "${DOCKER_TAG}"

      - name: 'Deploy to GKE'
        run: |-
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

          kubectl apply -n "${NAMESPACE}" -f kube/k8s-dev.yaml
          kubectl set image -n "${NAMESPACE}" deployment/"${DEPLOYMENT_NAME}" "${DEPLOYMENT_NAME}=${DOCKER_TAG}"
          kubectl rollout status -n "${NAMESPACE}" deployment/"${DEPLOYMENT_NAME}"
          kubectl get services -n "${NAMESPACE}" -o wide
